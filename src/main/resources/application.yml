spring:
  application:
    name: career-board
  datasource:
    url: jdbc:postgresql://localhost:5432/career_board_database?currentSchema=career_board_schema # Update to point to your local PostgreSQL
    username: career_board_user # Replace with your local PostgreSQL username
    password: career_board_password # Replace with your local PostgreSQL password
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties: {} # Remove Google Cloud SQL socket factory properties
  jpa:
    #    properties:
    #      hibernate:
    #        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update

  jackson:
    serialization:
      FAIL_ON_EMPTY_BEANS: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

greeting: "${sm://projects/553556926651/secrets/greeting/versions/1}"

server:
  port: 8081
